<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baldwin</title>
    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="baldwin-home">
    <div class="container text-center py-5">
      <img
        src="logo.png"
        alt="Baldwin Logo"
        class="img-fluid mb-4 baldwin-logo"
      />
      <h1 class="display-4 text-primary">Baldwin Inbox Assistant</h1>
      <p class="lead text-secondary mx-auto baldwin-copy">
        This site serves <code>ai-plugin.json</code> and the OpenAPI document for
        ChatGPT plugins.
      </p>
      <p class="text-secondary mb-4">
        Backend routes are available at <code>/api/scan-mail</code>, <code>/api/summarize-email</code>, <code>/api/build-digest</code>, and <code>/api/send-digest</code>.
      </p>
      <a class="btn btn-primary" href="openapi.yaml">View OpenAPI spec</a>
    </div>
    <!-- Bootstrap JS (Optional for interactive components) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
